name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject config.js from secrets
        run: |
          cat > config.js <<EOF
          window.SUPABASE_URL = '${{ vars.SUPABASE_URL }}';
          window.SUPABASE_KEY = '${{ secrets.SUPABASE_PUBLISHABLE_KEY }}';
          window.EMAILJS_PUBLIC_KEY  = '${{ vars.EMAILJS_PUBLIC_KEY }}';
          window.EMAILJS_SERVICE_ID  = '${{ vars.EMAILJS_SERVICE_ID }}';
          window.EMAILJS_TEMPLATE_ID = '${{ vars.EMAILJS_TEMPLATE_ID }}';
          window.BD_MAILING_ADDRESS  = '${{ vars.BD_MAILING_ADDRESS }}';
          window.US_MAILING_ADDRESS  = '${{ vars.US_MAILING_ADDRESS }}';
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
